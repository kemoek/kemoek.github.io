<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kemal | Software Developer</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f8fafc;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --card-border: #334155;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 1rem;
            width: 90%;
        }
        h1 { font-size: 2.5rem; margin-top: 0; margin-bottom: 0.2rem; color: var(--accent); }
        p { font-size: 1.1rem; opacity: 0.8; margin: 0.5rem 0; }
        
        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem; 
            margin-top: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            padding: 1.2rem;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin-top: 0; margin-bottom: 10px; color: var(--accent); }
        
        .app-visual {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .habit-icon {
            stroke: var(--accent);
            stroke-width: 1.5;
            fill: none;
            width: 80%;
            height: 80%;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            opacity: 0.5;
        }
        a { color: var(--accent); text-decoration: none; font-weight: bold; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            background: #0ea5e9;
            color: white;
            border-radius: 4px;
            font-size: 0.8rem;
            margin-top: auto;
        }
        .app-button {
            background-color: #0ea5e9;
            color: white !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: inline-block;
            transition: background-color 0.3s;
        }
        .app-button:hover {
            background-color: #0284c7;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kemal</h1>
        <p>Software Developer | Backend & Mobile Specialist</p>
        
        <div class="projects">
            
            <div class="card">
                <h3>TAM90</h3>
                <img src="/logo.png" alt="TAM90 Logo" class="app-visual">
                
                <p>Football Quiz & Trivia</p>
                <div style="margin-top: 10px;">
                    <a href="https://apps.apple.com/tr/app/tam90/id6760856728" target="_blank" class="app-button">
                        App Store
                    </a>
                </div>
                <div style="margin-top: 12px; font-size: 0.85rem;">
                    <a href="/privacy-policy.html" target="_blank" style="opacity: 0.7; font-weight: normal;">
                        Privacy Policy
                    </a>
                </div>
            </div>

            <div class="card">
                <h3>SoloHabit</h3>
                
                <div class="app-visual" style="border: 2px solid var(--card-border);">
                    <svg class="habit-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="16 12 12 16 8 12"/>
                        <line x1="12" y1="8" x2="12" y2="16"/>
                        <path d="M12,2A10,10,0,0,0,2,12a10,10,0,0,0,10,10,10,10,0,0,0,10-10A10,10,0,0,0,12,2Zm0,18a8,8,0,1,1,8-8A8,8,0,0,1,12,20Z"/>
                    </svg>
                </div>

                <p>Offline daily habit and task manager.</p>
                <div style="margin-top: auto;">
                    <span class="badge">Coming Soon</span>
                </div>
            </div>
            
        </div>

        <div class="footer">
            <p>© 2026 Kemal | <a href="/app-ads.txt">app-ads.txt</a> | <a href="/privacy-policy.html">Privacy Policy</a></p>
            <p>This is the official publisher page for my mobile applications.</p>
        </div>
    </div>

</body>
</html>
